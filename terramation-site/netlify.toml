[[redirects]]
  from = "/news/human-composting/*"
  to = "/blog/:splat"
  status = 301

[[redirects]]
  from = "/blog/"
  to = "/news/"
  status = 301

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
